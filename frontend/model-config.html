<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型配置 - DeepSleep AI</title>
    <link rel="stylesheet" href="styles.css?v=3">
    <style>
        .config-container {
            display: flex;
            height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .config-container .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .config-container .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .config-container .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 0;
            transition: color .2s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: all .15s;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-tertiary);
            color: var(--accent);
            border-right: 2px solid var(--accent);
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            background: var(--bg-secondary);
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
        }

        .content-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .content-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .tabs {
            display: flex;
            gap: 24px;
            padding: 0 28px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 12px 0;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all .2s;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .content-body {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
        }

        .provider-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .add-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background .2s;
        }

        .add-btn:hover {
            background: var(--accent-hover);
        }

        .provider-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .provider-card {
            display: flex;
            align-items: center;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all .15s;
        }

        .provider-card:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .provider-card.active {
            border-color: var(--accent);
            background: rgba(124, 106, 239, .08);
        }

        .provider-icon {
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 16px;
        }

        .provider-info {
            flex: 1;
        }

        .provider-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .provider-url {
            font-size: 12px;
            color: var(--text-muted);
        }

        .provider-status {
            padding: 3px 8px;
            background: rgba(124, 106, 239, .1);
            color: var(--accent);
            border-radius: 4px;
            font-size: 11px;
        }

        .config-form {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .form-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .save-btn {
            padding: 7px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background .2s;
        }

        .save-btn:hover {
            background: var(--accent-hover);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group label .required {
            color: var(--danger);
            margin-left: 2px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: border-color .2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .delete-btn {
            padding: 7px 16px;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-left: 8px;
            transition: all .2s;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        .models-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .models-section h4 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .model-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .model-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .model-name {
            font-size: 13px;
            color: var(--text-primary);
        }

        .model-actions {
            display: flex;
            gap: 6px;
        }

        .model-actions button {
            padding: 4px 10px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-test {
            background: rgba(124, 106, 239, .1);
            color: var(--accent);
        }

        .btn-test:hover {
            background: rgba(124, 106, 239, .2);
        }

        .btn-delete {
            background: rgba(229, 83, 83, .1);
            color: var(--danger);
        }

        .btn-delete:hover {
            background: rgba(229, 83, 83, .2);
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            color: var(--text-muted);
            opacity: .5;
        }

        .empty-state h3 {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 13px;
        }

        .preset-section {
            background: var(--bg-tertiary);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .preset-section h4 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .preset-btn {
            padding: 5px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all .2s;
        }

        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="config-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>DeepSleep AI</h1>
                <a href="index.html" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    返回聊天
                </a>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    模型提供商
                </div>
                <div class="nav-item" onclick="location.href='prompt-config.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    系统提示词
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h2>模型提供商</h2>
                <p>配置对话使用的 AI 模型。支持 LM Studio、DeepSeek、豆包、Kimi 等多种模型。</p>
            </div>

            <div class="tabs">
                <div class="tab active">对话</div>
            </div>

            <div class="content-body">
                <div class="provider-section">
                    <div class="section-header">
                        <h3>提供商列表</h3>
                        <button class="add-btn" onclick="showAddForm()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            添加
                        </button>
                    </div>
                    <div class="provider-list" id="providerList"></div>
                </div>

                <div id="configForm" style="display: none;"></div>
            </div>
        </main>
    </div>

    <script src="websocket.js"></script>
    <script>
        let currentUser = null;
        let providers = [];
        let selectedProvider = null;

        const presets = {
            lmstudio: { name: 'LM Studio', base_url: 'http://localhost:1234/v1', api_key: '', model_name: 'local-model' },
            ollama: { name: 'Ollama', base_url: 'http://localhost:11434/v1', api_key: '', model_name: 'llama2' },
            deepseek: { name: 'DeepSeek', base_url: 'https://api.deepseek.com/v1', api_key: '', model_name: 'deepseek-chat' },
            doubao: { name: '豆包', base_url: 'https://ark.cn-beijing.volces.com/api/v3', api_key: '', model_name: 'ep-xxxxxxxxxxxxx' },
            kimi: { name: 'Kimi', base_url: 'https://api.moonshot.cn/v1', api_key: '', model_name: 'kimi-k2.6' },
            openai: { name: 'OpenAI', base_url: 'https://api.openai.com/v1', api_key: '', model_name: 'gpt-3.5-turbo' }
        };

        function checkLogin() {
            const savedUser = localStorage.getItem('user');
            if (!savedUser) {
                alert('请先登录');
                window.location.href = 'index.html';
                return false;
            }
            currentUser = JSON.parse(savedUser);
            return true;
        }

        async function init() {
            if (!checkLogin()) return;
            try {
                await wsManager.connect();
                setupMessageHandlers();
                loadProviders();
                wsManager.send({
                    id: MSG_ID.RESTORE_SESSION,
                    data: { user_id: currentUser.id, token: currentUser.token || '' }
                });
            } catch (error) {
                console.error('连接失败:', error);
                alert('WebSocket 连接失败，请确保服务器已启动并刷新页面');
            }
        }

        function setupMessageHandlers() {
            wsManager.on(MSG_ID.RESTORE_SESSION_RESPONSE, (data) => {
                if (data.success) {
                    loadProviders();
                } else {
                    alert('会话已过期，请重新登录');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                }
            });

            wsManager.on(MSG_ID.PROVIDERS_RESPONSE, (data) => {
                providers = Array.isArray(data) ? data : [];
                renderProviderList();
            });

            wsManager.on(MSG_ID.ADD_PROVIDER, (data) => {
                if (data.success) {
                    loadProviders();
                    hideAddForm();
                } else {
                    alert('添加失败');
                }
            });

            wsManager.on(MSG_ID.UPDATE_PROVIDER, (data) => {
                if (data.success) {
                    loadProviders();
                    hideConfigForm();
                } else {
                    alert('更新失败');
                }
            });

            wsManager.on(MSG_ID.DELETE_PROVIDER, (data) => {
                if (data.success) {
                    selectedProvider = null;
                    loadProviders();
                    hideConfigForm();
                }
            });

            wsManager.on(MSG_ID.TEST_MODEL_RESPONSE, (data) => {
                const testBtn = document.getElementById('testModelBtn');
                if (testBtn) {
                    testBtn.disabled = false;
                    testBtn.textContent = '测试连接';
                }
                if (data.success) {
                    showTestResult(true, '连接成功！模型响应: ' + (data.response || 'OK'));
                } else {
                    showTestResult(false, '连接失败: ' + (data.message || '未知错误'));
                }
            });
        }

        function showTestResult(success, message) {
            const existingResult = document.getElementById('testResult');
            if (existingResult) existingResult.remove();

            const resultDiv = document.createElement('div');
            resultDiv.id = 'testResult';
            resultDiv.style.cssText = `
                margin-top: 14px;
                padding: 12px 14px;
                border-radius: 8px;
                font-size: 13px;
                animation: slideIn .3s ease;
                ${success
                    ? 'background: rgba(124,106,239,.1); color: var(--accent); border: 1px solid var(--accent);'
                    : 'background: rgba(229,83,83,.1); color: var(--danger); border: 1px solid var(--danger);'}
            `;
            resultDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 16px;">${success ? '✓' : '✗'}</span>
                    <span>${message}</span>
                </div>
            `;

            const configForm = document.getElementById('configForm');
            if (configForm) {
                configForm.appendChild(resultDiv);
                setTimeout(() => {
                    resultDiv.style.opacity = '0';
                    resultDiv.style.transition = 'opacity .5s ease';
                    setTimeout(() => resultDiv.remove(), 500);
                }, 5000);
            }
        }

        function loadProviders() {
            wsManager.send({
                id: MSG_ID.GET_PROVIDERS,
                data: { user_id: currentUser.id }
            });
        }

        function renderProviderList() {
            const listEl = document.getElementById('providerList');

            if (providers.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        <h3>暂无提供商</h3>
                        <p>点击上方"添加"按钮创建新的模型配置</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = providers.map(p => `
                <div class="provider-card ${selectedProvider?.id === p.id ? 'active' : ''}"
                     onclick="selectProvider(${p.id})">
                    <div class="provider-icon">${getProviderIcon(p.type)}</div>
                    <div class="provider-info">
                        <div class="provider-name">${escapeHtml(p.name)}</div>
                        <div class="provider-url">${escapeHtml(p.base_url)}</div>
                    </div>
                    <span class="provider-status">${escapeHtml(p.type)}</span>
                </div>
            `).join('');
        }

        function getProviderIcon(type) {
            const icons = { lmstudio: '🖥️', ollama: '🦙', deepseek: '🔍', doubao: '📦', kimi: '🌙', openai: '🤖' };
            return icons[type] || '🤖';
        }

        function selectProvider(id) {
            selectedProvider = providers.find(p => p.id === id);
            renderProviderList();
            showConfigForm();
        }

        function showAddForm() {
            selectedProvider = null;
            renderProviderList();

            const formEl = document.getElementById('configForm');
            formEl.style.display = 'block';
            formEl.innerHTML = `
                <div class="config-form">
                    <div class="form-header">
                        <h3>添加提供商</h3>
                        <div>
                            <button class="save-btn" onclick="addProvider()">保存</button>
                            <button class="delete-btn" onclick="hideConfigForm()">取消</button>
                        </div>
                    </div>

                    <div class="preset-section">
                        <h4>快速预设</h4>
                        <div class="preset-buttons">
                            <button class="preset-btn" onclick="applyPreset('lmstudio')">LM Studio</button>
                            <button class="preset-btn" onclick="applyPreset('ollama')">Ollama</button>
                            <button class="preset-btn" onclick="applyPreset('deepseek')">DeepSeek</button>
                            <button class="preset-btn" onclick="applyPreset('doubao')">豆包</button>
                            <button class="preset-btn" onclick="applyPreset('kimi')">Kimi</button>
                            <button class="preset-btn" onclick="applyPreset('openai')">OpenAI</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>提供商名称 <span class="required">*</span></label>
                        <input type="text" id="providerName" placeholder="例如：我的本地模型">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>类型 <span class="required">*</span></label>
                            <select id="providerType">
                                <option value="lmstudio">LM Studio</option>
                                <option value="ollama">Ollama</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="doubao">豆包</option>
                                <option value="kimi">Kimi</option>
                                <option value="openai">OpenAI</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>API 密钥</label>
                            <input type="password" id="providerApiKey" placeholder="本地模型可不填">
                            <div class="form-hint">本地模型如 LM Studio、Ollama 无需填写</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>API 基础 URL <span class="required">*</span></label>
                        <input type="text" id="providerBaseUrl" placeholder="例如：http://localhost:1234/v1">
                        <div class="form-hint">OpenAI 兼容格式的 API 地址，通常以 /v1 结尾</div>
                    </div>

                    <div class="form-group">
                        <label>模型名称 <span class="required">*</span></label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="providerModelName" placeholder="例如：kimi-k2.6, deepseek-chat" style="flex: 1;">
                            <button class="save-btn" onclick="fetchModels()" style="white-space: nowrap; background: #667eea;">获取模型</button>
                        </div>
                        <div id="fetchModelsResult" style="margin-top: 6px;"></div>
                        <div class="form-hint">点击"获取模型"自动从API获取可用模型列表</div>
                    </div>
                </div>
            `;
            formEl.scrollIntoView({ behavior: 'smooth' });
        }

        function showConfigForm() {
            if (!selectedProvider) return;

            const formEl = document.getElementById('configForm');
            formEl.style.display = 'block';
            formEl.innerHTML = `
                <div class="config-form">
                    <div class="form-header">
                        <h3>配置提供商</h3>
                        <div>
                            <button class="save-btn" onclick="updateProvider()">保存</button>
                            <button class="delete-btn" onclick="deleteProvider()">删除</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>提供商名称 <span class="required">*</span></label>
                        <input type="text" id="providerName" value="${escapeHtml(selectedProvider.name)}">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>类型</label>
                            <input type="text" value="${escapeHtml(selectedProvider.type)}" disabled style="opacity:.6;">
                        </div>
                        <div class="form-group">
                            <label>API 密钥</label>
                            <input type="text" id="providerApiKey" value="${escapeHtml(selectedProvider.api_key_masked || '未配置')}" placeholder="无" readonly style="opacity: 0.7;">
                            ${selectedProvider.api_key_configured ? '<small style="color: #888;">API Key 已配置</small>' : '<small style="color: #ff6b6b;">未配置 API Key</small>'}
                        </div>
                    </div>

                    <div class="form-group">
                        <label>API 基础 URL <span class="required">*</span></label>
                        <input type="text" id="providerBaseUrl" value="${escapeHtml(selectedProvider.base_url)}">
                    </div>

                    <div class="form-group">
                        <label>模型名称</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="providerModelName" value="${escapeHtml(selectedProvider.model_name || '')}" placeholder="未设置" style="flex: 1;">
                            <button class="save-btn" onclick="fetchModels()" style="white-space: nowrap; background: #667eea;">获取模型</button>
                        </div>
                        <div id="fetchModelsResult" style="margin-top: 6px;"></div>
                        <div class="form-hint">点击"获取模型"自动从API获取可用模型列表</div>
                    </div>

                    <div class="models-section">
                        <h4>模型测试</h4>
                        <div class="model-list">
                            <div class="model-item">
                                <span class="model-name">${escapeHtml(selectedProvider.model_name || '默认模型')}</span>
                                <div class="model-actions">
                                    <button id="testModelBtn" class="btn-test" onclick="testConnection()">测试连接</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-hint" style="margin-top: 6px;">
                            点击测试按钮验证模型连接是否正常，将发送一个简单的测试消息。
                        </div>
                    </div>
                </div>
            `;
            formEl.scrollIntoView({ behavior: 'smooth' });
        }

        function hideConfigForm() {
            document.getElementById('configForm').style.display = 'none';
            selectedProvider = null;
            renderProviderList();
        }

        function hideAddForm() {
            hideConfigForm();
        }

        function applyPreset(type) {
            const preset = presets[type];
            if (preset) {
                document.getElementById('providerName').value = preset.name;
                document.getElementById('providerType').value = type;
                document.getElementById('providerBaseUrl').value = preset.base_url;
                document.getElementById('providerApiKey').value = preset.api_key;
                const modelNameInput = document.getElementById('providerModelName');
                if (modelNameInput) modelNameInput.value = preset.model_name;
            }
        }

        function addProvider() {
            const name = document.getElementById('providerName').value.trim();
            const type = document.getElementById('providerType').value;
            const apiKey = document.getElementById('providerApiKey').value.trim();
            const baseUrl = document.getElementById('providerBaseUrl').value.trim();
            const modelName = document.getElementById('providerModelName').value.trim();

            if (!name || !type || !baseUrl || !modelName) {
                alert('请填写必填项');
                return;
            }

            if (!wsManager.isConnected) {
                alert('WebSocket 未连接，请刷新页面重试');
                return;
            }

            wsManager.send({
                id: MSG_ID.ADD_PROVIDER,
                data: { user_id: currentUser.id, name, type, api_key: apiKey, base_url: baseUrl, model_name: modelName }
            });
        }

        function updateProvider() {
            if (!selectedProvider) return;

            const name = document.getElementById('providerName').value.trim();
            const apiKey = document.getElementById('providerApiKey').value.trim();
            const baseUrl = document.getElementById('providerBaseUrl').value.trim();
            const modelName = document.getElementById('providerModelName').value.trim();

            if (!name || !baseUrl || !modelName) {
                alert('请填写必填项');
                return;
            }

            wsManager.send({
                id: MSG_ID.UPDATE_PROVIDER,
                data: { provider_id: selectedProvider.id, name, api_key: apiKey, base_url: baseUrl, model_name: modelName }
            });
        }

        function deleteProvider() {
            if (!selectedProvider) return;
            if (!confirm(`确定要删除提供商 "${selectedProvider.name}" 吗？`)) return;
            wsManager.send({
                id: MSG_ID.DELETE_PROVIDER,
                data: { provider_id: selectedProvider.id }
            });
        }

        function testConnection() {
            if (!selectedProvider) {
                alert('请先选择一个提供商');
                return;
            }

            const testBtn = document.getElementById('testModelBtn');
            if (testBtn) {
                testBtn.disabled = true;
                testBtn.textContent = '测试中...';
            }

            const existingResult = document.getElementById('testResult');
            if (existingResult) existingResult.remove();

            wsManager.send({
                id: MSG_ID.TEST_MODEL,
                data: { user_id: currentUser.id, provider_name: selectedProvider.name }
            });
        }

        function fetchModels() {
            const baseUrl = document.getElementById('providerBaseUrl').value.trim();
            const apiKey = document.getElementById('providerApiKey').value.trim();

            if (!baseUrl) {
                alert('请先填写 API 基础 URL');
                return;
            }

            const resultEl = document.getElementById('fetchModelsResult');
            resultEl.innerHTML = '<span style="color: var(--accent);">正在获取模型列表...</span>';

            wsManager.send({
                id: MSG_ID.FETCH_MODELS,
                data: { api_key: apiKey, base_url: baseUrl }
            });
        }

        wsManager.on(MSG_ID.FETCH_MODELS_RESPONSE, (data) => {
            const resultEl = document.getElementById('fetchModelsResult');
            if (!resultEl) return;

            if (data.success && data.models && data.models.length > 0) {
                let html = '<div style="margin-top: 6px;">';
                html += '<div style="font-size: 12px; color: var(--text-muted); margin-bottom: 6px;">找到 ' + data.count + ' 个模型，点击选择：</div>';
                html += '<div style="display: flex; flex-wrap: wrap; gap: 6px;">';
                data.models.forEach(model => {
                    html += '<button onclick="selectModelName(\'' + model.replace(/'/g, "\\'") + '\')" style="padding: 4px 10px; background: rgba(124,106,239,.1); border: 1px solid var(--accent); border-radius: 6px; font-size: 12px; cursor: pointer; color: var(--accent);">' + escapeHtml(model) + '</button>';
                });
                html += '</div></div>';
                resultEl.innerHTML = html;
            } else {
                resultEl.innerHTML = '<span style="color: var(--danger);">未找到模型，请检查 API 地址是否正确</span>';
            }
        });

        function selectModelName(modelName) {
            document.getElementById('providerModelName').value = modelName;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
